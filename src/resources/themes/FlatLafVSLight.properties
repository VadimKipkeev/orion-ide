# Theme name
name=FlatLafVSLight
dark=false

# Base colors
@background=#F5F5F5
@foreground=#1E1E1E
@accentColor=#007ACC
@selectionBackground=#A7D5FA
@selectionForeground=#000000

# Selection colors
@controlBackground=#FFFFFF
@borderColor=#D1D1D1
@disabledForeground=#808080

# FlatLaf global configuration
Component.focusColor=#007ACC
Component.borderColor=@borderColor
Component.focusedBorderColor=#007ACC

# Button colors
Button.background=#EEEEEE
Button.hoverBackground=#E0E0E0
Button.focusedBackground=#E0E0E0
Button.pressedBackground=#CDE6F7
Button.borderColor=@borderColor
Button.disabledBorderColor=#E5E5E5
Button.toolbar.hoverBackground=#E6E6E6

# Text input colors
TextComponent.background=@controlBackground
TextComponent.foreground=@foreground
TextComponent.selectAllOnFocusPolicy=always

# List colors
List.background=@controlBackground
List.selectionBackground=@selectionBackground
List.selectionForeground=@selectionForeground

# Table colors
Table.background=@controlBackground
Table.gridColor=#E5E5E5
Table.selectionBackground=@selectionBackground
Table.selectionForeground=@selectionForeground
TableHeader.background=#E9E9E9
TableHeader.bottomSeparatorColor=@borderColor

# Tree list colors
Tree.background=@controlBackground
Tree.selectionBackground=@selectionBackground
Tree.selectionForeground=@selectionForeground

# Menu colors
MenuBar.background=#EEF5FD
Menu.background=#EEF5FD
Menu.selectionBackground=#C9E0F7
MenuItem.selectionBackground=#C9E0F7

# Tab colors
TabbedPane.background=#E6E6E6
TabbedPane.selectedBackground=#F5F5F5
TabbedPane.hoverColor=#E0E0E0
TabbedPane.underlineColor=#007ACC
TabbedPane.contentAreaColor=@borderColor

# Scrollbar colors
ScrollBar.track=#F5F5F5
ScrollBar.thumb=#C1C1C1
ScrollBar.thumbHover=#A8A8A8

# Panel colors
ToolBar.background=#F5F5F5
StatusBar.background=#007ACC
StatusBar.foreground=#FFFFFF