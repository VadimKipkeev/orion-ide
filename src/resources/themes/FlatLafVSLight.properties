@theme="FlatLafVSLight"

# ===== Base colors =====
@background=#000000
@foreground=#1E1E1E
@accentColor=#CCCCCC

# ===== Rounds =====
Component.arc=6
Button.arc=8
TextComponent.arc=6
ComboBox.arc=6
ProgressBar.arc=4

# ===== Borders =====
Component.borderColor=#D0D0D0
Component.focusedBorderColor=#0078D4

# ===== Panels =====
Panel.background=#F3F3F3
ScrollPane.background=#F3F3F3
TabbedPane.background=#F3F3F3

# ===== Buttons =====
Button.startBackground=#FFFFFF
Button.endBackground=#F7F7F7
Button.foreground=#1E1E1E
Button.borderColor=#C8C8C8

Button.hoverBackground=#E6F2FB
Button.hoverBorderColor=#0078D4

Button.pressedBackground=#DCEAF7

# ===== Text inputs =====
TextComponent.background=#FFFFFF
TextComponent.foreground=#1E1E1E
TextComponent.borderColor=#C8C8C8
TextComponent.selectionBackground=#CCCCCC
TextComponent.selectionForeground=#1E1E1E

# ===== Menus =====
MenuBar.background=#F3F3F3
Menu.background=#FFFFFF
MenuItem.background=#FFFFFF
MenuItem.hoverBackground=#CCCCCC
MenuItem.foreground=#1E1E1E

# ===== Tables =====
Table.background=#FFFFFF
Table.foreground=#1E1E1E
Table.gridColor=#E0E0E0
Table.selectionBackground=#CDE6F7
Table.selectionForeground=#1E1E1E

# ===== Tabs =====
TabbedPane.tabInsets=8,12,8,12
TabbedPane.selectedBackground=#FFFFFF
TabbedPane.selectedForeground=#1E1E1E
TabbedPane.background=#F3F3F3
TabbedPane.foreground=#3C3C3C
TabbedPane.hoverColor=#E6F2FB
TabbedPane.focusColor=#0078D4

# ===== Progress bars =====
ProgressBar.background=#E0E0E0
ProgressBar.foreground=#0078D4

# ===== Slider =====
Slider.trackColor=#D0D0D0
Slider.thumbColor=#0078D4
Slider.thumbBorderColor=#005A9E

# ===== Fonts =====
defaultFont=12 "Segoe UI"